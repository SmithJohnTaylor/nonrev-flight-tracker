        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 6px;
            font-weight: bold;
        }
        .status.processing {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }
        .status.complete {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        .results-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✈️ Flight Distance Calculator</h1>
        
        <div class="controls">
            <button onclick="processFlights()" id="processBtn">Calculate Distances</button>
            <button onclick="downloadCSV()" id="downloadBtn" disabled>Download CSV</button>
            <button onclick="showSummary()" id="summaryBtn" disabled>Show Summary</button>
        </div>

        <div id="status"></div>
        <div id="progressContainer" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="progressText"></div>
        </div>

        <div id="stats" class="stats" style="display: none;"></div>
        
        <div id="results" class="results-container" style="display: none;">

                    </tr>
                </thead>
                <tbody id="resultsBody">
                </tbody>
            </table>
        </div>

                Papa.parse(csvContent, {
                    complete: function(results) {
                        csvData = results.data.filter(row => row[0] && row[0].trim() !== '');
                        showStatus(`✅ Loaded ${csvData.length} flight routes successfully!`, 'complete');
                        document.getElementById('processBtn').disabled = false;
                    },
                    error: function(error) {
                        showStatus('Error parsing CSV: ' + error.message, 'error');
                    }
                });
        }

        function showStatus(message, type = 'processing') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }

        function updateProgress(current, total) {
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const progressContainer = document.getElementById('progressContainer');
            
            progressContainer.style.display = 'block';
            const percentage = (current / total) * 100;
            progressFill.style.width = percentage + '%';
            progressText.textContent = `Processing ${current} of ${total} routes (${Math.round(percentage)}%)`;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 3959; // Earth's radius in miles
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function processFlights() {
            if (csvData.length === 0) {
                showStatus('No data to process', 'error');
                return;
            }

            document.getElementById('processBtn').disabled = true;
            showStatus('Processing flight routes...', 'processing');
            processedData = [];

            let processed = 0;
            const total = csvData.length;

            for (let i = 0; i < csvData.length; i++) {
                const row = csvData[i];
                const route = row[0];
                
                if (route && route.includes('/')) {
                    const [origin, destination] = route.split('/');
                    
                    const originCoords = airportCoords[origin];
                    const destCoords = airportCoords[destination];
                    
                    let distanceMiles = 'N/A';
                    let distanceKm = 'N/A';
                    
                    if (originCoords && destCoords) {
                        distanceMiles = Math.round(calculateDistance(
                            originCoords.lat, originCoords.lng,
                            destCoords.lat, destCoords.lng
                        ));
                        distanceKm = Math.round(distanceMiles * 1.60934);
                    }
                    
                    processedData.push({
                        route: route,
                        origin: origin,
                        destination: destination,
                        originName: originCoords?.name || origin,
                        destName: destCoords?.name || destination,
                        distanceMiles: distanceMiles,
                        distanceKm: distanceKm
                    });
                }
                
                processed++;
                if (processed % 10 === 0 || processed === total) {
                    updateProgress(processed, total);
                    await new Promise(resolve => setTimeout(resolve, 1)); // Allow UI to update
                }
            }

            document.getElementById('progressContainer').style.display = 'none';
            showStatus(`✅ Processed ${processedData.length} flight routes successfully!`, 'complete');
            
            displayResults();
            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('summaryBtn').disabled = false;
        }

        function displayResults() {
            const resultsBody = document.getElementById('resultsBody');
            resultsBody.innerHTML = '';

            processedData.forEach(flight => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${flight.route}</td>
                    <td>${flight.origin} (${flight.originName})</td>
                    <td>${flight.destination} (${flight.destName})</td>
                    <td>${flight.distanceMiles}</td>
                    <td>${flight.distanceKm}</td>
                `;
                resultsBody.appendChild(row);
            });

            document.getElementById('results').style.display = 'block';
        }

        function showSummary() {
            const validDistances = processedData.filter(f => f.distanceMiles !== 'N/A').map(f => f.distanceMiles);
            const totalDistance = validDistances.reduce((sum, dist) => sum + dist, 0);
            const avgDistance = validDistances.length > 0 ? totalDistance / validDistances.length : 0;
            const maxDistance = validDistances.length > 0 ? Math.max(...validDistances) : 0;
            const minDistance = validDistances.length > 0 ? Math.min(...validDistances) : 0;
            
            const uniqueAirports = new Set();
            processedData.forEach(f => {
                uniqueAirports.add(f.origin);
                uniqueAirports.add(f.destination);
            });

            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${processedData.length}</div>
                    <div class="stat-label">Total Routes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueAirports.size}</div>
                    <div class="stat-label">Unique Airports</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalDistance.toLocaleString()}</div>
                    <div class="stat-label">Total Miles</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${Math.round(avgDistance)}</div>
                    <div class="stat-label">Average Distance</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${maxDistance}</div>
                    <div class="stat-label">Longest Route</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${minDistance}</div>
                    <div class="stat-label">Shortest Route</div>
                </div>
            `;
            statsDiv.style.display = 'grid';
        }

        function downloadCSV() {
            if (processedData.length === 0) {
                showStatus('No data to download', 'error');
                return;
            }

            const csvContent = [
                ['Route', 'Distance (miles)', 'Distance (km)'],
                ...processedData.map(flight => [
                    flight.route,
                    flight.distanceMiles,
                    flight.distanceKm
                ])
            ];

            const csvString = Papa.unparse(csvContent);
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', 'flight_distances.csv');
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showStatus('CSV downloaded successfully!', 'complete');
            }
        }
    </script>
</body>
</html>
